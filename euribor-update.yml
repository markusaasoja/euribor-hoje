name: Atualizar Euribor

on:
  schedule:
    # 09:00 UTC de segunda a sexta (~10:00 em Lisboa no inverno, ~10:00 WEST no verao).
    # A fonte gratuita tem 24h de desfasamento, por isso o valor obtido e o do dia util anterior.
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}   # permite correr a mao a partir do separador Actions

permissions:
  contents: write

concurrency:
  group: euribor-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Atualizar euribor-data.json
        run: node scripts/update-euribor.mjs

      - name: Commit (se houver alteracoes)
        run: |
          git config user.name "euribor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add euribor-data.json
          if git diff --staged --quiet; then
            echo "Sem alteracoes."
          else
            git commit -m "Euribor: atualizacao automatica ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Purge jsDelivr (para o site apanhar o novo JSON)
        run: |
          curl -s "https://purge.jsdelivr.net/gh/franklinsilvapt-arch/euribor-hoje@main/euribor-data.json" || true
