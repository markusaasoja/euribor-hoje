name: Atualizar Euribor

on:
  schedule:
      - cron: "0 9 * * 1-5"
        workflow_dispatch: {}

        permissions:
          contents: write

          concurrency:
            group: euribor-update
              cancel-in-progress: false

              jobs:
                update:
                    runs-on: ubuntu-latest
                        steps:
                              - uses: actions/checkout@v4
                                    - uses: actions/setup-node@v4
                                            with:
                                                      node-version: "20"
                                                            - name: Atualizar euribor-data.json
                                                                    run: node scripts/update-euribor.mjs
                                                                          - name: Commit
                                                                                  run: |
                                                                                            git config user.name "euribor-bot"
                                                                                                      git config user.email "actions@users.noreply.github.com"
                                                                                                                git add euribor-data.json
                                                                                                                          if git diff --staged --quiet; then
                                                                                                                                      echo "Sem alteracoes."
                                                                                                                                                else
                                                                                                                                                            git commit -m "Euribor: atualizacao automatica"
                                                                                                                                                                        for i in 1 2 3; do
                                                                                                                                                                                      git pull --rebase --autostash origin main && git push && break
                                                                                                                                                                                                    sleep 5
                                                                                                                                                                                                                done
                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                - name: Purgar jsDelivr
                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                  curl -s "https://purge.jsdelivr.net/gh/franklinsilvapt-arch/euribor-hoje@main/euribor-data.json" || true
                                                                                                                                                                                                                                                  
